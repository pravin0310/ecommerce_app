### `logstash.conf` — create at `ecommerce-microservices/logstash.conf`
```
input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }

  if [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  if [level] == "INFO" {
    mutate { add_tag => ["info"] }
  }

  # Parse timestamp
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Add environment tag
  mutate {
    add_field => {
      "environment" => "local"
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ecommerce-logs-%{+YYYY.MM.dd}"
  }

  # Also print to Logstash console for debugging
  stdout {
    codec => rubydebug
  }
}
```

