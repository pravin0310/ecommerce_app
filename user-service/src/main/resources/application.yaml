server:
  port: 8084

spring:
  application:
    name: userservice

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:postgresql://localhost:5432/userdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: 3cfa76ef14937f3d87a5c9c7f9b5a3d2e8f4a6b9c1d7e2f5a8b3c6d9e0f1a2b
  expiration: 86400000

management:
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans